<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- iPhone App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FF Companion">
    
    <title>FF Companion</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f1115;
            --card: #171a21;
            --muted: #9aa4b2;
            --text: #eef2f7;
            --accent: #7dd3fc;
            --border: #2a3140;
            --input: #11151c;
            --good: #86efac;
            --timer-bg: rgba(15, 17, 21, 0.98);
            --ai-glow: rgba(125, 211, 252, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.35;
            padding-bottom: 120px;
        }

        .app { max-width: 520px; margin: 0 auto; padding: 16px 14px; }

        .header {
            position: sticky; top: 0; z-index: 50;
            background: var(--timer-bg);
            padding: 10px 0 12px;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top);
        }

        h1 { font-size: 20px; margin: 0 0 4px; font-weight: 800; text-transform: uppercase; font-style: italic; letter-spacing: -0.02em; }
        h1 span { color: var(--accent); }
        .sub { color: var(--muted); font-size: 10px; margin: 0 0 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .tab-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-align: center; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); padding: 10px 2px;
            border-radius: 12px; font-weight: 700; font-size: 9px; cursor: pointer;
            text-transform: uppercase;
        }
        .tab-btn i { width: 16px; height: 16px; }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(125, 211, 252, 0.05); }

        .version-toggle {
            display: flex; background: var(--input); border-radius: 12px; padding: 4px; margin: 10px 0 20px; border: 1px solid var(--border);
        }
        .v-btn {
            flex: 1; text-align: center; padding: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); cursor: pointer; border-radius: 8px;
        }
        .v-btn.active { background: var(--accent); color: #000; }

        .panel { display: none; }
        .panel.active { display: block; }

        .block-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: 24px 4px 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border);
        }
        .block-name { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); }
        .block-rounds { font-size: 9px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 18px; margin: 12px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,.2);
        }
        .eyebrow { color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: .15em; font-weight: 800; margin-bottom: 10px; }

        .warmup-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .check-box { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .check-box.checked { background: var(--accent); border-color: var(--accent); }

        .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .exercise-title { font-size: 15px; font-weight: 800; text-transform: uppercase; font-style: italic; letter-spacing: 0.02em; }
        .exercise-meta { font-size: 10px; color: var(--muted); margin-top: 2px; font-weight: 700; text-transform: uppercase; }
        .rest-link { color: var(--accent); text-decoration: underline; cursor: pointer; margin-left: 6px; }

        .cues-grid { display: grid; grid-template-columns: 1fr; gap: 4px; margin: 10px 0; background: var(--input); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .cue-row { font-size: 11px; display: flex; gap: 8px; line-height: 1.4; }
        .cue-label { color: var(--accent); font-weight: 800; width: 42px; flex-shrink: 0; }

        .log-row { display: flex; gap: 6px; margin-top: 14px; }
        input[type=number], select {
            width: 100%; background: var(--input); color: var(--text);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 10px; font-size: 15px; font-weight: 700; text-align: center;
        }
        .add-btn { background: var(--accent); color: #000; border: none; border-radius: 10px; width: 52px; font-weight: 900; font-size: 18px; cursor: pointer; }

        .ai-btn { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            box-shadow: 0 0 10px var(--ai-glow);
            width: 100%; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
            margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .ai-response {
            background: rgba(125, 211, 252, 0.03); border: 1px solid var(--border);
            padding: 14px; border-radius: 14px; margin-top: 12px;
            font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap;
        }

        .roulette-box { min-height: 200px; display: flex; align-items: center; justify-content: left; padding: 25px; border: 2px dashed var(--border); border-radius: 24px; margin-bottom: 12px; background: rgba(0,0,0,0.15); }
        .roulette-text { font-size: 16px; font-weight: 700; color: var(--accent); line-height: 1.6; white-space: pre-wrap; }
        .big-btn { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 18px; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; }

        #timer-overlay {
            position: fixed; inset: 0; background: var(--timer-bg);
            z-index: 100; display: none; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }
        #timer-count { font-size: 140px; font-weight: 900; font-variant-numeric: tabular-nums; margin-bottom: 20px; color: var(--accent); }
        .timer-skip { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 30px; border-radius: 99px; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }

        .history-item { border-bottom: 1px solid var(--border); padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        .history-val { font-weight: 800; color: var(--accent); font-size: 14px; }
        
        .end-note { text-align: center; padding: 40px 10px 20px; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; border-top: 1px dashed var(--border); margin-top: 30px; }
        .end-note span { color: var(--accent); text-decoration: underline; cursor: pointer; }

        .loading-dots:after {
          content: ' .';
          animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
          0%, 20% { content: ' .'; }
          40% { content: ' ..'; }
          60% { content: ' ...'; }
          80%, 100% { content: ''; }
        }
    </style>
</head>
<body>

<div id="timer-overlay">
    <div style="font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4em;">Next Set Recovery</div>
    <div id="timer-count">60</div>
    <button class="timer-skip" onclick="closeTimer()">Skip Rest</button>
</div>

<div class="app">
    <div class="header">
        <h1>FF <span>Companion</span></h1>
        <div class="sub">Simply Strong • Home Gym v8.2</div>
        <div class="tabs">
            <div class="tab-btn active" onclick="showTab('upper', this)"><i data-lucide="dumbbell"></i>Upper</div>
            <div class="tab-btn" onclick="showTab('lower', this)"><i data-lucide="zap"></i>Lower</div>
            <div class="tab-btn" onclick="showTab('roulette', this)"><i data-lucide="dices"></i>Finish</div>
            <div class="tab-btn" onclick="showTab('vault', this)"><i data-lucide="history"></i>Vault</div>
        </div>
    </div>

    <div id="upper" class="panel active">
        <div class="version-toggle">
            <div class="v-btn active" id="v-btn-uA" onclick="setVersion('upper', 'A')">V-A: Power</div>
            <div class="v-btn" id="v-btn-uB" onclick="setVersion('upper', 'B')">V-B: Volume</div>
        </div>
        <div id="upper-content"></div>
    </div>

    <div id="lower" class="panel">
        <div class="version-toggle">
            <div class="v-btn active" id="v-btn-lA" onclick="setVersion('lower', 'A')">V-A: Strength</div>
            <div class="v-btn" id="v-btn-lB" onclick="setVersion('lower', 'B')">V-B: Unilateral</div>
        </div>
        <div id="lower-content"></div>
    </div>

    <div id="roulette" class="panel">
        <div class="card">
            <div class="eyebrow">4-Minute Bodyweight Finishers</div>
            <div class="roulette-box" id="roulette-box">
                <div class="roulette-text" style="color: var(--muted); opacity: 0.5;">Bulletized 4-minute drills. No equipment required.</div>
            </div>
            <button class="big-btn" onclick="spinRoulette()">Generate Bullet Finisher</button>
            <div style="border-top: 1px solid var(--border); padding-top: 25px; margin-top: 15px;">
                <label class="eyebrow">AI Dynamic Finisher</label>
                <select id="energy-level" style="margin-bottom: 12px;">
                    <option value="high">Energy: High 🔥</option>
                    <option value="medium" selected>Energy: Medium ⚡</option>
                    <option value="low">Energy: Low 🧘</option>
                </select>
                <button class="ai-btn" onclick="generateAiFinisher()"><i data-lucide="sparkles"></i> ✨ AI Bullet Generator</button>
                <div id="ai-finisher-result" class="ai-response" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div id="vault" class="panel">
        <div class="card">
            <div class="eyebrow">Training Logs & AI Forecast</div>
            <button class="ai-btn" onclick="analyzePerformance()"><i data-lucide="trending-up"></i> ✨ Forecast Next Week's Load</button>
            <div id="ai-analysis-result" class="ai-response" style="display: none; margin-bottom: 20px;"></div>
            <div id="history-list"></div>
            <button class="timer-skip" style="width: 100%; margin-top: 30px; background: #991b1b; border: none; color: #fecaca;" onclick="clearHistory()">Wipe All History</button>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; 

    const workouts = {
        upper: {
            A: {
                warmup: ["Arm Circles (15x)", "Band Pull-Aparts (20x)", "TRX Face Pulls (15x)", "Scapular Shrugs (15x)"],
                A: [{ name: 'A1. Barbell Bench', sets: '4x6-8', rest: 120, feel: 'Pec tension', cue: 'Drive feet into floor', watch: 'Shoulder rounding' }, { name: 'A2. SA Row', sets: '4x10-12', rest: 60, feel: 'Lats', cue: 'Pull elbow to hip', watch: 'Torso rotation' }],
                B: [{ name: 'B1. Overhead Press', sets: '3x8-10', rest: 90, feel: 'Shoulder caps', cue: 'Punch the ceiling', watch: 'Lower back arch' }, { name: 'B2. TRX Row', sets: '3x12-15', rest: 60, feel: 'Upper back', cue: 'Core like a plank', watch: 'Sagging hips' }, { name: 'B3. Lateral Raise', sets: '3x15', rest: 45, feel: 'Side delts', cue: 'Push out to walls', watch: 'Shrugging' }],
                E: [{ name: 'E1. Rear Delt Fly', sets: '2x15', rest: 30, feel: 'Back of shoulder', cue: 'Pinkies up', watch: 'Momentum' }, { name: 'E2. Bicep Curls', sets: '2x12', rest: 30, feel: 'Biceps', cue: 'Squeeze top', watch: 'Swinging' }, { name: 'E3. Tricep Ext.', sets: '2x12', rest: 30, feel: 'Triceps', cue: 'Pinned elbows', watch: 'Flaring' }, { name: 'E4. Facepull/Core', sets: '2x15', rest: 30, feel: 'Core stability', cue: 'Pull to forehead', watch: 'Chin poking' }]
            },
            B: {
                warmup: ["Arm Circles", "Wall Slides (12x)", "TRX Rows (15x)", "Bird-Dogs (8/side)"],
                A: [{ name: 'A1. Incline DB Press', sets: '4x10', rest: 90, feel: 'Upper chest', cue: 'Shoulders into bench', watch: 'Too much arch' }, { name: 'A2. TRX Pull-up', sets: '4xMAX', rest: 90, feel: 'Vertical pull', cue: 'Chest to rings', watch: 'Kicking' }],
                B: [{ name: 'B1. Arnold Press', sets: '3x12', rest: 60, feel: 'Shoulder integration', cue: 'Rotate as you push', watch: 'Locked elbows' }, { name: 'B2. Landmine Row', sets: '3x10', rest: 60, feel: 'Lat stretch', cue: 'Hinge back', watch: 'Rounding' }, { name: 'B3. DB Shrugs', sets: '3x15', rest: 45, feel: 'Traps', cue: 'Shoulders to ears', watch: 'Rolling' }],
                E: [{ name: 'E1. Hammer Curls', sets: '2x12', rest: 30, feel: 'Forearms', cue: 'Thumbs up', watch: 'Swinging' }, { name: 'E2. DB Skullcrushers', sets: '2x12', rest: 30, feel: 'Triceps', cue: 'Lower past head', watch: 'Moving elbows' }, { name: 'E3. Front Raises', sets: '2x12', rest: 30, feel: 'Front delt', cue: 'Control descent', watch: 'Momentum' }, { name: 'E4. Dead Bug', sets: '2x10/side', rest: 30, feel: 'Deep core', cue: 'Back flat on floor', watch: 'Back arching' }]
            }
        },
        lower: {
            A: {
                warmup: ["Leg Swings (15/side)", "90/90 Switches", "Bodyweight Squats (20x)", "Glute Bridges (15x)"],
                A: [{ name: 'A1. Back Squat', sets: '4x6-8', rest: 180, feel: 'Quads & Glutes', cue: 'Spread floor with feet', watch: 'Knees caving' }, { name: 'A2. Box Jumps', sets: '4x5', rest: 60, feel: 'Explosive power', cue: 'Land like a ninja', watch: 'Hard landings' }],
                B: [{ name: 'B1. Romanian DL', sets: '3x10-12', rest: 120, feel: 'Hamstrings', cue: 'Hinge back', watch: 'Curved spine' }, { name: 'B2. Glute Bridge', sets: '3x15', rest: 60, feel: 'Glute pump', cue: 'Heel drive', watch: 'Neck tension' }, { name: 'B3. Goblet Squat', sets: '3x12', rest: 60, feel: 'Quad pump', cue: 'Stay upright', watch: 'Hips rising fast' }],
                E: [{ name: 'E1. Calf Raises', sets: '2x20', rest: 30, feel: 'Lower leg', cue: 'Stretch at bottom', watch: 'Bouncing' }, { name: 'E2. Glute Bridge Hold', sets: '2x45s', rest: 30, feel: 'Glutes/Hams', cue: 'Squeeze hard at top', watch: 'Lower back arching' }, { name: 'E3. Side Plank', sets: '2x30s/side', rest: 30, feel: 'Obliques', cue: 'Hips high', watch: 'Sagging' }, { name: 'E4. Bird-Dog', sets: '2x10/side', rest: 30, feel: 'Core/Balance', cue: 'Reach long', watch: 'Torso rotation' }]
            },
            B: {
                warmup: ["Leg Swings", "Reverse Lunges (8/side)", "Bodyweight Squats (15x)", "Cat-Cow (10x)"],
                A: [{ name: 'A1. Trap Bar DL', sets: '4x8', rest: 150, feel: 'Leg power', cue: 'Push ground away', watch: 'Hips rising fast' }, { name: 'A2. Broad Jumps', sets: '4x3', rest: 60, feel: 'Horizontal power', cue: 'Jump for distance', watch: 'Stiff knees' }],
                B: [{ name: 'B1. Bulgarian Split Squat', sets: '3x10/side', rest: 60, feel: 'Quads/Glutes', cue: 'Lean forward', watch: 'Knee cave' }, { name: 'B2. Hamstring Bridge', sets: '3x15', rest: 60, feel: 'Hamstrings', cue: 'Tuck pelvis', watch: 'Lower back arch' }, { name: 'B3. Step Ups', sets: '3x10/side', rest: 60, feel: 'Glutes', cue: 'Lead heel drive', watch: 'Pushing with back foot' }],
                E: [{ name: 'E1. Reverse Crunches', sets: '2x15', rest: 30, feel: 'Lower abs', cue: 'Curl hips off floor', watch: 'Swinging legs' }, { name: 'E2. Clamshells', sets: '2x15/side', rest: 30, feel: 'Glute med', cue: 'Hips stacked', watch: 'Rolling back' }, { name: 'E3. Calf Raises', sets: '2x20', rest: 30, feel: 'Calves', cue: 'Pause at top', watch: 'Bouncing' }, { name: 'E4. Russian Twists', sets: '2x20', rest: 30, feel: 'Obliques', cue: 'Rotate shoulders', watch: 'Arm-only movement' }]
            }
        }
    };

    const hardcodedFinishers = [
        "4-MIN AMRAP:\n• 10 Pushups\n• 10 Air Squats\n• 10 Mountain Climbers",
        "TABATA (4 MINS):\n• 20s High Knees\n• 10s Rest\nRepeat x8",
        "LEG BURNER (4 MINS):\n• 30s Wall Sit\n• 30s Jump Squats\nRepeat x4",
        "CORE CRUSH (4 MINS):\n• 30s Plank\n• 30s Bicycle Crunches\nRepeat x4",
        "THE HUNDRED (4 MIN CAP):\n• 100 Air Squats\nFast as possible",
        "4-MIN EMOM:\n• 15 Lunges every minute\n• Max Pushups in remainder",
        "HAM-CORE (4 MINS):\n• 30s Glute Bridges\n• 30s Dead Bugs\nRepeat x4",
        "PUSH-PULL (4 MINS):\n• 10 Pushups\n• 10 TRX Rows (or DB Rows)\nNon-stop"
    ];

    let currentVersions = { upper: 'A', lower: 'A' };
    let timerInterval = null;

    async function callGemini(prompt, systemPrompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }], 
                        systemInstruction: { parts: [{ text: systemPrompt }] } 
                    }) 
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000)); }
        }
        return "Coaching unavailable.";
    }

    async function generateAiFinisher() {
        const energy = document.getElementById('energy-level').value;
        const resDiv = document.getElementById('ai-finisher-result');
        resDiv.style.display = 'block'; resDiv.innerHTML = "Thinking<span class='loading-dots'></span>";
        const prompt = `4-minute bodyweight finisher. Energy: ${energy}. Bullets only. Functional intensity.`;
        const res = await callGemini(prompt, "Fitness coach. No fluff. 4 mins max.");
        resDiv.innerHTML = `<strong>✨ AI BULLET FINISHER:</strong><br>${res}`;
    }

    async function analyzePerformance() {
        const logs = JSON.parse(localStorage.getItem('ff_logs_v8.2') || '[]');
        const resDiv = document.getElementById('ai-analysis-result');
        if (logs.length < 1) { resDiv.style.display = 'block'; resDiv.innerText = "Log a set first."; return; }
        resDiv.style.display = 'block'; resDiv.innerHTML = "Analyzing<span class='loading-dots'></span>";
        const prompt = `Logs: ${JSON.stringify(logs.slice(0,10))}. Recommend next week's weights (lbs) for main lifts.`;
        const res = await callGemini(prompt, "Expert Strength Coach. Forecast progression.");
        resDiv.innerHTML = `<strong>✨ NEXT WEEK'S TARGETS:</strong><br>${res}`;
    }

    function renderWorkout(part, version) {
        const area = document.getElementById(`${part}-content`);
        const d = workouts[part][version];
        area.innerHTML = `
            <div class="card"><div class="eyebrow">Warmup — 2 Rounds</div>${d.warmup.map(w => `<div class="warmup-item"><div class="check-box" onclick="toggleCheck(this)"></div><div class="text-sm font-bold">${w}</div></div>`).join('')}</div>
            <div class="block-header"><div class="block-name">A Block</div><div class="block-rounds">4 Rounds</div></div>${d.A.map(ex => renderEx(ex)).join('')}
            <div class="block-header"><div class="block-name">B Block</div><div class="block-rounds">3 Rounds</div></div>${d.B.map(ex => renderEx(ex)).join('')}
            <div class="block-header"><div class="block-name">E Block</div><div class="block-rounds">2 Rounds</div></div>${d.E.map(ex => renderEx(ex)).join('')}
            <div class="end-note">Done? Go to <span onclick="showTab('roulette', document.querySelectorAll('.tab-btn')[2])">Roulette</span>.</div>
        `;
        lucide.createIcons();
    }

    function renderEx(ex) {
        return `
            <div class="card exercise-card"><div class="exercise-header"><div><div class="exercise-title">${ex.name}</div><div class="exercise-meta">${ex.sets} • <span class="rest-link" onclick="startTimer(${ex.rest})">${ex.rest}s Rest</span></div></div><div class="check-box" onclick="toggleCheck(this)"></div></div>
            <div class="cues-grid"><div class="cue-row"><span class="cue-label">FEEL:</span><span>${ex.feel}</span></div><div class="cue-row"><span class="cue-label">CUE:</span><span>${ex.cue}</span></div><div class="cue-row"><span class="cue-label">WATCH:</span><span>${ex.watch}</span></div></div>
            <div class="log-row"><input type="number" class="w-input" placeholder="lbs"><input type="number" class="r-input" placeholder="reps"><button class="add-btn" onclick="saveExercise(this, '${ex.name}')">+</button></div></div>
        `;
    }

    function setVersion(p, v) { 
        currentVersions[p] = v;
        document.getElementById(`v-btn-${p === 'upper' ? 'uA' : 'lA'}`).classList.toggle('active', v === 'A');
        document.getElementById(`v-btn-${p === 'upper' ? 'uB' : 'lB'}`).classList.toggle('active', v === 'B');
        renderWorkout(p, v); 
    }

    function showTab(t, b) { 
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(t).classList.add('active'); b.classList.add('active');
        if(t === 'vault') renderHistory(); window.scrollTo(0,0);
    }

    function toggleCheck(e) { e.classList.toggle('checked'); e.innerHTML = e.classList.contains('checked') ? '<i data-lucide="check" style="width:14px;height:14px;color:#000"></i>' : ''; lucide.createIcons(); }

    function startTimer(s) {
        const o = document.getElementById('timer-overlay'), c = document.getElementById('timer-count');
        o.style.display = 'flex'; let r = s; c.innerText = r;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => { r--; c.innerText = r; if(r <= 0) { closeTimer(); try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();osc.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.2);}catch(e){} } }, 1000);
    }

    function closeTimer() { document.getElementById('timer-overlay').style.display = 'none'; clearInterval(timerInterval); }

    function saveExercise(btn, name) {
        const row = btn.parentElement, w = row.querySelector('.w-input').value, r = row.querySelector('.r-input').value;
        if(!w || !r) return;
        const entry = { name, w, r, date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) };
        let logs = JSON.parse(localStorage.getItem('ff_logs_v8.2') || '[]'); logs.unshift(entry);
        localStorage.setItem('ff_logs_v8.2', JSON.stringify(logs));
        btn.innerHTML = '✓'; btn.style.background = 'var(--good)';
        setTimeout(() => { btn.innerHTML = '+'; btn.style.background = 'var(--accent)'; row.querySelector('.w-input').value = ''; row.querySelector('.r-input').value = ''; }, 1200);
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('ff_logs_v8.2') || '[]');
        const container = document.getElementById('history-list');
        if(logs.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--muted);">Vault is empty.</div>'; return; }
        container.innerHTML = logs.map(l => `<div class="history-item"><div><div class="history-date">${l.date}</div><div style="font-weight:700;">${l.name}</div></div><div class="history-val">${l.w} lbs × ${l.r}</div></div>`).join('');
    }

    function clearHistory() { if(confirm("Clear history?")) { localStorage.removeItem('ff_logs_v8.2'); renderHistory(); } }

    function spinRoulette() {
        document.getElementById('roulette-box').innerHTML = `<div class="roulette-text">${hardcodedFinishers[Math.floor(Math.random() * hardcodedFinishers.length)]}</div>`;
    }

    window.onload = () => { renderWorkout('upper', 'A'); renderWorkout('lower', 'A'); lucide.createIcons(); };
</script>

</body>
</html>
